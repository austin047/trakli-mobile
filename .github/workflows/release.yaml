name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FLUTTER_VERSION: "3.38.9"
  FLUTTER_CHANNEL: "stable"
  XCODE_VERSION: "26"
  JAVA_VERSION: "17"
  RUBY_VERSION: "3.2"

jobs:
  release:
    name: Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: android
            runner: ubuntu-latest
            fastlane_dir: android/fastlane
          - os: ios
            runner: macos-14
            fastlane_dir: ios/fastlane
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ${{ matrix.fastlane_dir }}

      - name: Install Fastlane gems
        working-directory: ${{ matrix.fastlane_dir }}
        run: bundle install

      - name: Setup Java
        if: matrix.os == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Xcode
        if: matrix.os == 'ios'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Restore DerivedData cache
        if: matrix.os == 'ios'
        uses: actions/cache/restore@v4
        id: cache-deriveddata
        with:
          path: DerivedData
          key: deriveddata-${{ github.run_id }}
          restore-keys: |
            deriveddata-

      - name: Install Firebase CLI
        if: matrix.os == 'ios'
        run: npm install -g firebase-tools

      - name: Install FlutterFire CLI
        if: matrix.os == 'ios'
        run: dart pub global activate flutterfire_cli

      - name: Add pub cache to PATH
        if: matrix.os == 'ios'
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Setup SSH Key
        if: matrix.os == 'ios'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Setup Android Service Accounts
        if: matrix.os == 'android'
        env:
          GOOGLE_SERVICES_ACCOUNT_BASE64: ${{ secrets.GOOGLE_SERVICES_ACCOUNT_BASE64 }}
          CREDENTIAL_FILE_CONTENT: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_ACCOUNT_BASE64" | base64 --decode > google_service_account.json
          printf '%s' "$CREDENTIAL_FILE_CONTENT" > service_credentials_content.json

      - name: Setup iOS Service Accounts
        if: matrix.os == 'ios'
        env:
          CREDENTIAL_FILE_CONTENT: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
        run: |
          cat <<< "$CREDENTIAL_FILE_CONTENT" > service_credentials_content.json

      - name: Generate code
        if: matrix.os == 'ios'
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Release to Play Store
        if: matrix.os == 'android'
        working-directory: ${{ matrix.fastlane_dir }}
        run: bundle exec fastlane release_play_store
        env:
          APP_PACKAGE_NAME: ${{ vars.APP_PACKAGE_NAME }}

      - name: Release to App Store
        if: matrix.os == 'ios'
        working-directory: ${{ matrix.fastlane_dir }}
        run: bundle exec fastlane release_app_store
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          APP_BUNDLE_ID: ${{ vars.APP_BUNDLE_ID }}
