name: iOS Release (Main + Manual)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track'
        required: true
        default: 'testflight-dev'
        type: choice
        options:
          - testflight-staging
          - testflight-prod
          - firebase

env:
  FLUTTER_VERSION: "3.38.9"
  FLUTTER_CHANNEL: "stable"
  XCODE_VERSION: "26"
  RUBY_VERSION: "3.2"

jobs:
  build-and-release:
    name: iOS Release Pipeline
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Restore DerivedData cache
        uses: actions/cache/restore@v4
        id: cache-deriveddata
        with:
          path: DerivedData
          key: deriveddata-${{ github.run_id }}
          restore-keys: |
            deriveddata-
              
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install FlutterFire CLI
        run: dart pub global activate flutterfire_cli

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ios/fastlane

      - name: Install Fastlane gems
        working-directory: ios/fastlane
        run: bundle install

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Setup Service Accounts
        env:
          CREDENTIAL_FILE_CONTENT: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
        run: |
          cat <<< "$CREDENTIAL_FILE_CONTENT" > service_credentials_content.json

      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs


      - name: Release to TestFlight (Staging)
        if: ${{ github.event_name == 'push' || github.event.inputs.track == 'testflight-staging' }}
        working-directory: ios/fastlane
        run: bundle exec fastlane release_testflight_staging
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}

      - name: Release to TestFlight (Prod)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track == 'testflight-prod' }}
        working-directory: ios/fastlane
        run: bundle exec fastlane release_app_store
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          APP_BUNDLE_ID: ${{ vars.APP_BUNDLE_ID }}

      - name: Release to Firebase (iOS Dev)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track == 'firebase' }}
        working-directory: ios/fastlane
        run: bundle exec fastlane release_firebase
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_APP_ID_IOS_DEV: ${{ secrets.FIREBASE_APP_ID_IOS_DEV }}
